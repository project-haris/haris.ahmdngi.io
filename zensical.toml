[project]
site_name = "Haris Docs"
site_url = "https://haris.ahmdngi.io/"
site_description = "Documentation-first reference for the Haris maritime edge intelligence platform."
docs_dir = "docs"
repo_url = "https://github.com/ahmdngi/marine_haris"
extra_css = ["stylesheets/extra.css"]
extra_javascript = ["javascripts/extra.js"]
nav = [
  {"Overview" = "index.md"},
  {"Architecture" = "architecture.md"},
  {"Deployment" = "deployment.md"},
  {"Security" = "security.md"},
  {"Repos" = "repos.md"},
  {"FAQ" = "faq.md"},
]

[project.theme]
language = "en"
features = [
  "navigation.instant",
  "navigation.sections",
  "navigation.top",
  "content.code.copy",
  "search.suggest",
  "search.highlight",
]
palette = { scheme = "slate", primary = "custom", accent = "custom" }

[project.extra]
generator = false
