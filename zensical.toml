[project]
site_name = "Haris Docs"
site_url = "https://haris.ahmdngi.io/"
site_description = "Documentation-first reference for the Haris maritime edge intelligence platform."
docs_dir = "."
repo_url = "https://github.com/ahmdngi/marine_haris"
extra_css = ["docs/stylesheets/extra.css"]
extra_javascript = ["docs/javascripts/extra.js"]
nav = [
  {"Overview" = "index.md"},
  {"Architecture" = "docs/architecture.md"},
  {"Deployment" = "docs/deployment.md"},
  {"Security" = "docs/security.md"},
  {"Repos" = "docs/repos.md"},
  {"FAQ" = "docs/faq.md"},
]

[project.theme]
language = "en"
features = [
  "navigation.instant",
  "navigation.sections",
  "navigation.top",
  "content.code.copy",
  "search.suggest",
  "search.highlight",
]
palette = { scheme = "slate", primary = "custom", accent = "custom" }

[project.extra]
generator = false
